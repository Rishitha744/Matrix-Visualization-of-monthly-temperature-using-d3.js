<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CSCE 679 A1 — Hong Kong Monthly Temperature Matrix</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>
  <header class="header">
    <div class="title-block">
      <h1>Hong Kong Monthly Temperature (Last 10 Years)</h1>
      <p class="subtitle">
        Matrix view (Year × Month). Background color encodes monthly Max/Min. Each cell includes a mini daily line chart.
      </p>
    </div>

    <div class="controls">
      <button id="toggleBtn" class="btn">Mode: MAX</button>
      <div id="legend"></div>
    </div>
  </header>

  <main>
    <div id="chart"></div>
  </main>

  <div id="tooltip" class="tooltip" style="opacity:0;"></div>

  <script src="script.js"></script>
</body>
</html>
